# Fabrique automatiquement les installateurs Windows (.exe) et Mac (.dmg)
# à chaque fois qu'une étiquette de version (v1.0.0, v1.1.0...) est poussée,
# puis les attache à la page "Releases" du dépôt.
name: Construire les installateurs

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer les dépendances
        run: npm ci

      - name: Construire l'installateur
        run: npx electron-builder --publish never

      - name: Publier sur la page Releases
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Avion Messager ${{ github.ref_name }}
          body: |
            Téléchargez le fichier qui correspond à votre ordinateur, juste en dessous (section "Assets") :
            - Windows : le fichier `.exe`
            - Mac : le fichier `.dmg`

            Mode d'emploi complet dans le [README](https://github.com/annece29-netizen/avion-messager#readme).
          files: |
            dist/*.exe
            dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
